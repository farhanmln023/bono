<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Special Message 💖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, pink, violet, cyan, yellow);
            background-size: 400% 400%;
            animation: bgGerak 5s infinite alternate;
            font-family: "Comic Sans MS", cursive;
            text-align: center;
        }

        @keyframes bgGerak {
            0% {background-position: left;}
            100% {background-position: right;}
        }

        .container {
            margin-top: 20%;
        }

        h1 {
            font-size: 50px;
            color: white;
            text-shadow: 3px 3px 10px black;
            animation: kedip 1s infinite;
        }

        @keyframes kedip {
            0% {opacity: 1;}
            50% {opacity: 0.3;}
            100% {opacity: 1;}
        }

        .emot {
            font-size: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="emot">💖✨💘🥺💔😭💞🔥😜💋💥</div>
    <h1>💔 BONO JANGAN GAMON 💔</h1>
    <div class="emot">😭💘✨💖🔥🥺💞💋😜💥</div>
</div>

</body>
</html>
